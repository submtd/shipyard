name: changelog
on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - env:
          BASE_REF: ${{ github.base_ref }}
        run: git fetch origin "$BASE_REF"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          KEEL_PR_IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
        run: python3 scripts/check_changelog.py "$BASE_REF" "$HEAD_REF"
