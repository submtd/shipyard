name: ci
on: [push, pull_request]
permissions:
  contents: read
jobs:
  python:
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        python: ["3.9", "3.12"]
    steps:
      - uses: "actions/checkout@v4"
      - uses: "actions/setup-python@v5"
        with:
          python-version: "${{ matrix.python }}"
      - run: "pip install pytest"
      - run: "python -m pytest"
