name: "ci"
on: [push, pull_request]
permissions:
  contents: read
jobs:
  node:
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        node: ["20"]
    steps:
      - uses: "actions/checkout@11d5960a326750d5838078e36cf38b85af677262"  # v4
      - uses: "actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444"  # v5
        with:
          node-version: "${{ matrix.node }}"
      - run: "npm ci"
      - run: "npm test"
