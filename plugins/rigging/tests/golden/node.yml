name: "ci"
on: [push, pull_request]
permissions:
  contents: read
jobs:
  node:
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        node: ["20"]
    steps:
      - uses: "actions/checkout@v4"
      - uses: "actions/setup-node@v5"
        with:
          node-version: "${{ matrix.node }}"
      - run: "npm ci"
      - run: "npm test"
