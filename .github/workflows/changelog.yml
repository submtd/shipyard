name: changelog
on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch origin "${{ github.base_ref }}" --depth=0 || git fetch origin "${{ github.base_ref }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/check_changelog.py "${{ github.base_ref }}" "${{ github.head_ref }}"
