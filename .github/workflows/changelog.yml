name: changelog
# Least privilege: this job only reads the repo and reports a status.
# Without an explicit block the job inherits the repository default,
# which is write-scoped in any repo not configured otherwise.
permissions:
  contents: read
on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - env:
          BASE_REF: ${{ github.base_ref }}
        run: git fetch origin "$BASE_REF"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          KEEL_PR_IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
        run: python3 scripts/check_changelog.py "$BASE_REF" "$HEAD_REF"
